name: Fetch Events & Deploy

on:
  # Run twice a day to keep the calendar fresh
  schedule:
    - cron: '0 8,20 * * *'   # 08:00 and 20:00 UTC daily

  # Re-deploy on every push to main (picks up site changes)
  push:
    branches: [main]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit events.json back to main
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Fetch events from austinridgeriders.com
        id: fetch
        continue-on-error: true
        run: python scripts/fetch_events.py

      # Commit updated events.json back to main so the data persists between
      # runs and is available if GitHub Pages is served from the branch directly.
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit events.json and debug files to main
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git add _ride_debug.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: sync events data [skip ci]"
          git push

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp events.json _site/
          cp favicon.svg _site/
          cp apple-touch-icon.png _site/
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
